<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library of Flavors - The Writers Cafe</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css"><link rel="stylesheet" href="responsive.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo"><i class="fas fa-feather-alt" style="color:var(--gold);"></i> The Writers <span>Cafe</span></a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="menu.html" class="nav-link active">Menu</a></li>
        <li><a href="cart.html" class="nav-link">Cart</a></li>
        <li><a href="checkout.html" class="nav-link">Checkout</a></li>
      </ul>
      <div style="display:flex; align-items:center; gap:15px;">
        <a href="#" class="cart-btn" id="cart-icon-btn"><i class="fas fa-shopping-bag"></i><span class="cart-counter">0</span></a>
        <button class="menu-toggle" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
      </div>
    </div>
  </nav>

  <!-- CATALOG GRID PAGE -->
  <section class="section-padding" style="margin-top: 70px; min-height: 80vh;">
    <div class="container">
      <div class="menu-controls">
        <input type="text" id="search-input" class="search-input" placeholder="Search literary dishes (e.g. Gatsby, Pasta)...">
        <div class="filter-tabs">
          <button class="filter-btn active" data-category="all">All Chapters</button>
          <button class="filter-btn" data-category="starters">Prologues (Starters)</button>
          <button class="filter-btn" data-category="mains">Climax (Mains)</button>
          <button class="filter-btn" data-category="desserts">Epilogues (Desserts)</button>
          <button class="filter-btn" data-category="drinks">Elixirs (Drinks)</button>
        </div>
      </div>
      <div class="menu-grid" id="menu-grid"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 The Writers Cafe. Simulated Client Platform.</p>
    </div>
  </footer>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header"><h3><i class="fas fa-shopping-bag"></i> Drawer Cart</h3><button id="drawer-close" style="color:#fff;"><i class="fas fa-times"></i></button></div>
    <div class="drawer-items" id="drawer-items"></div>
    <div class="drawer-footer" id="drawer-footer">
      <div class="drawer-row"><span>Subtotal:</span><span id="drawer-subtotal">₹0</span></div>
      <div class="drawer-row total"><span>Total:</span><span id="drawer-grand">₹0</span></div>
      <a href="cart.html" class="btn btn-outline" style="text-align:center; display:block; margin: 10px 0 0;">View Full Cart</a>
      <a href="checkout.html" class="btn btn-primary" style="text-align:center; display:block;">Checkout Now</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
